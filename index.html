<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Telegram Community</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#020617,#111827);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;color:#fff}
.card{width:100%;max-width:420px;background:rgba(255,255,255,.06);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:28px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.45)}
.logo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:4px solid #fff}
.badge{display:inline-block;margin:14px 0;padding:6px 12px;background:#0f172a;border:1px solid #229ED9;border-radius:999px;color:#7dd3fc;font-size:12px}
h1{font-size:26px;margin:8px 0}
p{color:#cbd5e1}
.btn{display:block;margin:22px 0;padding:16px;background:linear-gradient(90deg,#229ED9,#38bdf8);color:#fff;text-decoration:none;font-weight:700;border-radius:14px;animation:pulse 1.8s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
.list{text-align:left;margin:20px 0}.item{margin:10px 0}
.timer{font-size:32px;color:#ff4d4d;font-weight:700;letter-spacing:2px;margin-top:18px;text-shadow:0 0 10px rgba(255,77,77,.5)}
.small{font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
<img class="logo" src="https://telegram-ads.riyazshaikh.com/wp-content/uploads/2026/07/pnrg.jpg">
<div class="badge">✔ Official Telegram Community</div>
<h1>Vir@l videos Channel</h1>
<p>Join our official Telegram community for updates, announcements and exclusive content.</p>
<a class="btn" href="https://t.me/+uiNoYXYg7UswMWVl" target="_blank">🚀 JOIN TELEGRAM</a>
<div class="list">
<div class="item">📢 Instant Updates</div>
<div class="item">🔔 Exclusive Content</div>
<div class="item">👥 Community Access</div>
<div class="item">⚡ Fast Notifications</div>
</div>
<div class="timer" id="countdown">00 : 03 : 00</div>
<div class="small">Limited access window</div>
</div>
<script>
const START=180;let t=START;
function tick(){
 const m=Math.floor(t/60),s=t%60;
 countdown.textContent=`00 : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
 t--; if(t<0)t=START;
}
tick();setInterval(tick,1000);
</script>
</body>
